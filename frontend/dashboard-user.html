<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Dashboard - ZDT Billing</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e3a8a 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .logout-btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .logout-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }
    
    .section {
      margin-bottom: 40px;
    }
    
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(37,99,235,0.6);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: #cbd5e1;
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    
    .license-grid {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }
    
    .license-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(16px);
      transition: all 0.3s;
    }
    
    .license-card:hover {
      border-color: rgba(96,165,250,0.2);
      background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    
    .license-key {
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 12px;
      word-break: break-all;
      padding: 12px;
      background: rgba(96,165,250,0.1);
      border-radius: 8px;
      border-left: 3px solid #60a5fa;
    }
    
    .license-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .detail-item {
      display: flex;
      flex-direction: column;
    }
    
    .detail-label {
      font-size: 0.82rem;
      color: rgba(148,163,184,0.8);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .detail-value {
      font-size: 0.95rem;
      color: #e2e8f0;
      font-weight: 500;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .status-active {
      background: rgba(34,197,94,0.15);
      color: #4ade80;
    }
    
    .status-inactive {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
    }
    
    .license-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    
    .btn-small {
      padding: 8px 16px;
      font-size: 0.85rem;
      flex: 1;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 16px;
      color: rgba(148,163,184,0.8);
    }
    
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(148,163,184,0.8);
    }
    
    .error {
      padding: 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      color: #fca5a5;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Header -->
  <header>
    <h1>Your Licenses</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <!-- Error Message -->
  <div id="error-message" class="error" style="display: none;"></div>

  <!-- Your Licenses Section -->
  <section class="section">
    <div class="section-title">Your Active Licenses</div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="buyNewKey()">💳 Buy New License</button>
      <button class="btn btn-secondary" onclick="refreshLicenses()">🔄 Refresh</button>
    </div>
    
    <div id="licenses-container">
      <div class="loading">Loading your licenses...</div>
    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // =============================================
  // Configuration
  // =============================================
  const SUPABASE_URL = 'https://qkbzwbgiyqedljkypvqe.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrYnp3YmdpeXFlZGxqa3lwdnFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE2OTcwMDAwMDAsImV4cCI6OTE2MzUxOTk5OX0.UuKZfEZY-yZsvmCh3X8yZyXzZU1NKJqPpPGx88xaQRU';
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // =============================================
  // Main Functions
  // =============================================
  async function loadLicenses() {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      
      if (!session) {
        window.location.href = '/index.html';
        return;
      }

      const email = session.user.email;
      
      // Fetch licenses from backend
      const response = await fetch('/get-licenses', {
        headers: {
          'Authorization': `Bearer ${session.access_token}`
        }
      });

      const result = await response.json();

      if (!result.success) {
        showError('Failed to load licenses. Please try again.');
        document.getElementById('licenses-container').innerHTML = renderEmptyState();
        return;
      }

      const licenses = result.licenses || [];

      if (licenses.length === 0) {
        document.getElementById('licenses-container').innerHTML = renderEmptyState();
      } else {
        document.getElementById('licenses-container').innerHTML = licenses
          .map(license => renderLicenseCard(license))
          .join('');
      }
    } catch (err) {
      console.error('Error:', err);
      showError('An error occurred while loading licenses.');
    }
  }

  function renderLicenseCard(license) {
    const createdDate = new Date(license.created_at).toLocaleDateString('en-IN', {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });

    const status = license.active ? 'active' : 'inactive';
    const statusClass = license.active ? 'status-active' : 'status-inactive';
    const statusText = license.active ? 'Active' : 'Inactive';

    return `
      <div class="license-card">
        <div class="license-key">${license.license_key}</div>
        <div class="license-details">
          <div class="detail-item">
            <div class="detail-label">Status</div>
            <div><span class="status-badge ${statusClass}">${statusText}</span></div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Purchased</div>
            <div class="detail-value">${createdDate}</div>
          </div>
          ${license.device_id ? `
            <div class="detail-item">
              <div class="detail-label">Activated Device</div>
              <div class="detail-value">${license.device_id}</div>
            </div>
          ` : `
            <div class="detail-item">
              <div class="detail-label">Status</div>
              <div class="detail-value">Not activated yet</div>
            </div>
          `}
        </div>
        <div class="license-actions">
          <button class="btn btn-secondary btn-small" onclick="copyToClipboard('${license.license_key}')">📋 Copy</button>
          ${!license.device_id ? `
            <button class="btn btn-secondary btn-small" onclick="activateLicense('${license.license_key}')">✓ Activate</button>
          ` : ''}
        </div>
      </div>
    `;
  }

  function renderEmptyState() {
    return `
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <p style="margin-bottom: 20px; font-size: 1.1rem; color: #cbd5e1;">
          You don't have any licenses yet.
        </p>
        <button class="btn btn-primary" onclick="buyNewKey()">Buy Your First License</button>
      </div>
    `;
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      alert('License key copied to clipboard!');
    }).catch(() => {
      alert('Failed to copy. Please copy manually.');
    });
  }

  function activateLicense(licenseKey) {
    alert('Activation feature coming soon. Your license is: ' + licenseKey);
  }

  async function buyNewKey() {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      
      if (!session) {
        window.location.href = '/index.html';
        return;
      }

      // Get Razorpay key
      const keyResponse = await fetch('/get-key');
      const keyData = await keyResponse.json();
      const key = keyData.key;

      // Create order
      const orderResponse = await fetch('/create-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: 99900, email: session.user.email })
      });
      const order = await orderResponse.json();

      // Initialize Razorpay
      const options = {
        key: key,
        amount: order.amount,
        currency: order.currency,
        order_id: order.id,
        name: 'ZDT Billing',
        description: 'License Purchase',
        prefill: {
          email: session.user.email,
          name: session.user.user_metadata?.name || ''
        },
        handler: async function (response) {
          // Verify payment
          const verifyResponse = await fetch('/verify-payment', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`
            },
            body: JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              email: session.user.email
            })
          });

          const result = await verifyResponse.json();
          if (result.success) {
            alert('License purchased successfully!\n\nLicense: ' + result.license);
            loadLicenses();
          } else {
            showError('Payment verification failed: ' + result.message);
          }
        },
        theme: { color: '#2563eb' }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    } catch (error) {
      console.error('Payment error:', error);
      showError('Payment initialization failed. Please try again.');
    }
  }

  function refreshLicenses() {
    loadLicenses();
  }

  function showError(message) {
    const errorEl = document.getElementById('error-message');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
    setTimeout(() => {
      errorEl.style.display = 'none';
    }, 5000);
  }

  async function logout() {
    await supabase.auth.signOut();
    window.location.href = '/index.html';
  }

  // Load licenses on page load
  loadLicenses();
</script>

</body>
</html>
