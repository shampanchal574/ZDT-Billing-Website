<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZDT Billing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ZDT Billing secure magic link login">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#1e1b4b,#0f172a);
}
.btn-main{
    background:linear-gradient(135deg,#4f46e5,#2563eb);
}
.btn-main:hover{
    opacity:.95;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-2xl">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white">ZDT Billing</h1>
        <p class="text-blue-100 mt-2">Secure login with magic link</p>
    </div>

    <div id="login-box">
        <input
            type="email"
            id="email-field"
            placeholder="Enter your email"
            class="w-full px-5 py-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder:text-slate-300 outline-none focus:ring-2 focus:ring-blue-400"
        >

        <button
            onclick="handleMagicLink()"
            id="send-btn"
            class="btn-main w-full mt-4 text-white py-4 rounded-2xl font-semibold transition"
        >
            Send Magic Link
        </button>

        <p class="text-sm text-blue-100 text-center mt-4">
            Password not required. Login directly from email.
        </p>
    </div>

    <div id="logged-box" class="hidden text-center">
        <p class="text-white text-lg font-semibold mb-5">You are logged in</p>

        <a
            href="/user_dashboard.html"
            class="block w-full btn-main text-white py-4 rounded-2xl font-semibold"
        >
            Open Dashboard
        </a>

        <button
            onclick="logout()"
            class="w-full mt-4 bg-white text-slate-900 py-4 rounded-2xl font-semibold"
        >
            Logout
        </button>
    </div>

    <p id="status-msg" class="text-center text-sm text-blue-100 mt-5"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://qkbzwbgiyqedljkypvqe.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_REAL_SUPABASE_ANON_KEY";

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

async function checkUser() {
    const { data } = await supabaseClient.auth.getSession();

    if (data.session) {
        document.getElementById("login-box").classList.add("hidden");
        document.getElementById("logged-box").classList.remove("hidden");
    } else {
        document.getElementById("login-box").classList.remove("hidden");
        document.getElementById("logged-box").classList.add("hidden");
    }
}

async function handleMagicLink() {

    const email = document.getElementById("email-field").value.trim();
    const status = document.getElementById("status-msg");
    const btn = document.getElementById("send-btn");

    if (!email) {
        status.innerText = "Please enter email.";
        return;
    }

    btn.innerText = "Sending...";
    btn.disabled = true;
    status.innerText = "";

    const { error } = await supabaseClient.auth.signInWithOtp({
        email: email,
        options: {
            emailRedirectTo: window.location.origin + "/user_dashboard.html"
        }
    });

    if (error) {
        status.innerText = error.message;
    } else {
        status.innerText = "Magic link sent. Check your email inbox.";
    }

    btn.innerText = "Send Magic Link";
    btn.disabled = false;
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}

checkUser();
</script>

</body>
</html>
